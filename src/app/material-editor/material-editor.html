<div class="h-full flex flex-col bg-gray-50 overflow-hidden no-print-bg print-expand">
  <!-- Encabezado / Barra de herramientas -->
  <header
    class="bg-white border-b shadow-sm p-4 flex justify-between items-center no-print relative z-10 shrink-0"
  >
    <div class="flex items-center gap-4">
      <button
        mat-icon-button
        (click)="goBack()"
        title="Regresar a alumnos"
        class="text-gray-500 hover:bg-gray-100 rounded-full transition-colors"
      >
        <mat-icon>arrow_back</mat-icon>
      </button>
      <div>
        <h1
          class="text-xl font-bold bg-clip-text text-transparent bg-linear-to-r from-primary to-purple-600 truncate max-w-[200px] sm:max-w-md"
        >
          Editor Didáctico
        </h1>
        @if (profile) {
          <p class="text-xs text-gray-500 font-medium">
            Adaptación enfocada a: <strong>{{ profile.anonymousId }}</strong>
          </p>
        }
      </div>
    </div>

    <div class="flex items-center gap-3">
      <span class="hidden sm:inline-block text-sm text-gray-400 font-mono"
        >{{ wordCount }} palabras</span
      >
      <button
        mat-stroked-button
        color="primary"
        class="rounded-lg shadow-sm hover:shadow-md transition-all border-gray-200! min-w-0 px-3! sm:px-4!"
        [disabled]="isSaving"
        (click)="saveToDatabase()"
        matTooltip="Guardar en la nube"
      >
        <span class="flex items-center justify-center">
          @if (isSaving) {
            <mat-icon class="sm:mr-1 animate-spin">sync</mat-icon> <span class="hidden sm:inline">Guardando</span>
          } @else {
            <mat-icon class="sm:mr-1 text-primary">cloud_upload</mat-icon> <span class="hidden sm:inline">{{ isEditMode ? 'Actualizar Nube' : 'Guardar Nube' }}</span>
          }
        </span>
      </button>
      <button
        mat-flat-button
        color="primary"
        class="rounded-lg shadow-md hover:shadow-lg transition-all min-w-0 px-3! sm:px-4!"
        (click)="exportPdf()"
        matTooltip="Exportar a PDF"
      >
        <span class="flex items-center justify-center">
          <mat-icon class="sm:mr-1">picture_as_pdf</mat-icon>
          <span class="hidden sm:inline">Exportar a PDF</span>
        </span>
      </button>
    </div>
  </header>

  <!-- Contenedor Dividido (Split View) -->
  <div class="flex-1 overflow-hidden grid grid-cols-1 lg:grid-cols-2 min-h-0 print-expand">
    <!-- Lado Izquierdo: Editor Texto Plano (Markdown) -->
    <div class="h-full flex flex-col border-r border-gray-200 bg-white no-print min-h-0">
      <div
        class="bg-gray-100/50 p-2 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider border-b border-gray-200 flex justify-between"
      >
        <span>1. Editor de Borrador (Markdown)</span>
        <mat-icon class="scale-75 text-gray-400">edit</mat-icon>
      </div>
      <div class="flex-1 p-4 overflow-hidden min-h-0">
        <textarea
          class="w-full h-full p-4 font-mono text-sm leading-relaxed text-gray-700 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary resize-none transition-all shadow-inner"
          [(ngModel)]="rawContent"
          (ngModelChange)="onContentChange()"
          placeholder="Tu contenido redactado por IA aparecerá aquí... Eres libre de editarlo, escribir # Títulos, - listas, o **negritas**."
        ></textarea>
      </div>
    </div>

    <!-- Lado Derecho: La previsualización de impresión enriquecida -->
    <div class="h-full flex flex-col bg-gray-100/30 min-h-0 print-expand">
      <div
        class="bg-gray-100/50 p-2 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider border-b border-gray-200 flex justify-between no-print"
      >
        <span>2. Vista Final del Documento</span>
        <mat-icon class="scale-75 text-gray-400">preview</mat-icon>
      </div>
      <div class="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar relative min-h-0">
        <!-- Documento tipo "Página A4" visualmente -->
        <article
          class="print-container bg-white rounded-xl shadow-lg border border-gray-200 mx-auto max-w-4xl min-h-[800px] p-8 md:p-12 mb-8"
        >
          <div
            class="markdown-body prose prose-slate prose-headings:text-primary prose-a:text-accent prose-strong:text-gray-900 max-w-none"
            [innerHTML]="parsedContent"
          ></div>

          @if (!parsedContent) {
            <div
              class="h-full w-full flex flex-col items-center justify-center text-gray-300 gap-4 mt-20 no-print"
            >
              <mat-icon class="scale-[3] opacity-20">subject</mat-icon>
              <p>El documento está vacío</p>
            </div>
          }
        </article>
      </div>
    </div>
  </div>
</div>
