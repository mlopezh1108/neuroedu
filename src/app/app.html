<mat-toolbar class="fixed top-0 z-50 w-full primary-toolbar shadow-md flex items-center gap-4">
  <button mat-icon-button (click)="sidenav.toggle()">
    <mat-icon>menu</mat-icon>
  </button>
  <span class="font-bold tracking-wide">NeuroEdu</span>
  <div class="flex-1"></div>
  
  @if (authService.user$ | async; as user) {
    <!-- Controles de Usuario Autenticado -->
    <div class="flex items-center gap-2">
      <button mat-button (click)="openInvitations()" class="hidden md:flex text-white!">
        <mat-icon>person_add</mat-icon>
        <span class="ml-1 tracking-wide font-medium">Invitaciones</span>
      </button>
      
      <div class="h-6 w-px bg-white/20 mx-2 hidden md:block"></div>

      <div class="flex items-center gap-3 px-3 py-1.5 bg-white/10 hover:bg-white/20 border border-white/20 rounded-full transition-all cursor-default">
        <img [src]="user.photoURL" class="w-7 h-7 rounded-full border border-white/50 shadow-sm" alt="Avatar">
        <span class="text-xs font-semibold text-white max-w-[120px] truncate hidden sm:block tracking-wide">{{ user.displayName }}</span>
        <button mat-icon-button (click)="logout()" class="text-white! hover:bg-red-500/20! transition-colors scale-75" title="Cerrar Sesión">
          <mat-icon class="scale-110">logout</mat-icon>
        </button>
      </div>
    </div>
  }

  <button mat-icon-button (click)="themeService.toggleTheme()" [title]="themeService.isDarkMode() ? 'Modo Claro' : 'Modo Oscuro'">
    <mat-icon>{{ themeService.isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>
</mat-toolbar>
<mat-drawer-container class="absolute h-[calc(100vh-64px)] top-[64px] bottom-0 left-0 right-0">
  <mat-drawer mode="over" #sidenav class="w-64">
    <mat-nav-list>
      <mat-list-item routerLink="/" (click)="sidenav.close()">
        <mat-icon matListItemIcon>home</mat-icon>
        <span matListItemTitle>Inicio</span>
      </mat-list-item>
      <mat-list-item routerLink="/students" (click)="sidenav.close()">
        <mat-icon matListItemIcon>groups</mat-icon>
        <span matListItemTitle>Alumnos Perfilados</span>
      </mat-list-item>
      <mat-list-item routerLink="/profile" (click)="sidenav.close()">
        <mat-icon matListItemIcon>person_add</mat-icon>
        <span matListItemTitle>Perfilar Alumno</span>
      </mat-list-item>
      <mat-divider class="my-2"></mat-divider>
      <mat-list-item routerLink="/biblioteca" (click)="sidenav.close()">
        <mat-icon matListItemIcon>library_books</mat-icon>
        <span matListItemTitle>Biblioteca Didáctica</span>
      </mat-list-item>
    </mat-nav-list>
  </mat-drawer>
  <mat-drawer-content>
    <router-outlet></router-outlet>
  </mat-drawer-content>
</mat-drawer-container>
